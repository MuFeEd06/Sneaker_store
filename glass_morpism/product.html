<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Product Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="logo">
<img src="logo/logo.png" alt="Sneaker Logo">
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="#">Collection</a>
<a href="#">Cart (<span id="cart-count">0</span>)</a>
</nav>

</header>


<!-- PRODUCT SECTION -->

<section class="product-page">

<div class="product-container">

<!-- PRODUCT IMAGE -->

<div class="product-image">
<img id="product-img" src="" alt="Sneaker">
</div>


<!-- PRODUCT DETAILS -->

<div class="product-info">

<h1 id="product-name"></h1>

<p class="price" id="product-price"></p>

<p class="description">
Premium sneaker designed for comfort and style. Perfect for streetwear lovers.
</p>

<!-- SIZE SELECT -->

<label>Select Size</label>

<select id="size-select">

<option value="">Select Size</option>
<option>UK 6</option>
<option>UK 7</option>
<option>UK 8</option>
<option>UK 9</option>
<option>UK 10</option>

</select>


<!-- BUTTON -->

<button onclick="addToCartWithSize()" class="buy-btn">
Add to Cart
</button>

</div>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
